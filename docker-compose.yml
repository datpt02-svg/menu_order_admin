services:
  postgres:
    image: postgres:16-alpine
    container_name: samcamping-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-samcamping_admin}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-samcamping_admin}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: samcamping-setup
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      UPLOAD_DIR: /app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:generate && npm run db:migrate && npm run db:seed"]
    volumes:
      - ./:/app
      - /app/node_modules
      - uploads:/app/public/uploads
    restart: "no"

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samcamping-admin
    env_file:
      - .env
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      UPLOAD_DIR: /app/public/uploads
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3001,http://127.0.0.1:3001}
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    expose:
      - "3001"
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  user:
    image: node:20-alpine
    container_name: samcamping-user
    working_dir: /app
    command: ["sh", "-lc", "npx serve samcamping -l 3000"]
    expose:
      - "3000"
    volumes:
      - ./:/app:ro
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: samcamping-proxy
    depends_on:
      admin:
        condition: service_started
      user:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
