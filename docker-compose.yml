services:
  postgres:
    image: postgres:16-alpine
    container_name: samcamping-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-samcamping_admin}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-samcamping_admin}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: samcamping-setup
    working_dir: /app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "npm run db:generate && npm run db:migrate && npm run db:seed"]
    volumes:
      - ./:/app
      - /app/node_modules
      - uploads:/app/uploads
    restart: "no"

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samcamping-admin
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
